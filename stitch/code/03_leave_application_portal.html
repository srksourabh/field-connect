<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Leave Application Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-gray-900 dark:text-gray-100 antialiased h-screen flex justify-center overflow-hidden">
<!-- Mobile Container -->
<div class="w-full max-w-md h-full flex flex-col bg-background-light dark:bg-background-dark relative shadow-2xl overflow-hidden">
<!-- Header -->
<header class="pt-12 pb-4 px-6 flex items-center justify-between bg-white/5 dark:bg-[#15202b] backdrop-blur-md sticky top-0 z-20 border-b border-gray-200 dark:border-gray-800">
<button class="p-2 -ml-2 rounded-full hover:bg-gray-100 dark:hover:bg-white/10 transition-colors">
<span class="material-icons text-gray-600 dark:text-gray-300">arrow_back_ios_new</span>
</button>
<h1 class="text-lg font-semibold text-gray-900 dark:text-white">Leave Application</h1>
<button class="p-2 -mr-2 rounded-full hover:bg-gray-100 dark:hover:bg-white/10 transition-colors">
<span class="material-icons text-gray-600 dark:text-gray-300">history</span>
</button>
</header>
<!-- Main Content (Scrollable) -->
<main class="flex-1 overflow-y-auto no-scrollbar pb-24">
<!-- Balance Dashboard Section -->
<section class="mt-6 mb-8 px-6">
<div class="flex items-center justify-between mb-4">
<h2 class="text-sm font-semibold uppercase tracking-wider text-gray-500 dark:text-gray-400">My Balances</h2>
<span class="text-xs text-primary dark:text-primary cursor-pointer hover:underline">View Policy</span>
</div>
<!-- Horizontal Scroll Cards -->
<div class="flex space-x-4 overflow-x-auto no-scrollbar pb-2 -mx-6 px-6 snap-x snap-mandatory">
<!-- Card 1: Sick Leave -->
<div class="snap-center shrink-0 w-40 bg-white dark:bg-[#1c2a36] rounded-xl p-4 border border-gray-200 dark:border-gray-700 shadow-sm relative overflow-hidden group">
<div class="absolute top-0 right-0 w-16 h-16 bg-primary/10 rounded-bl-full -mr-4 -mt-4 transition-transform group-hover:scale-110"></div>
<div class="relative z-10">
<div class="w-10 h-10 rounded-lg bg-red-100 dark:bg-red-500/20 flex items-center justify-center mb-3 text-red-600 dark:text-red-400">
<span class="material-icons text-xl">medication</span>
</div>
<p class="text-xs text-gray-500 dark:text-gray-400 font-medium mb-1">Sick Leave</p>
<div class="flex items-baseline space-x-1">
<span class="text-2xl font-bold text-gray-900 dark:text-white">4</span>
<span class="text-xs text-gray-400">/ 12 days</span>
</div>
<div class="w-full bg-gray-200 dark:bg-gray-700 h-1.5 rounded-full mt-3 overflow-hidden">
<div class="bg-red-500 h-full rounded-full" style="width: 33%"></div>
</div>
</div>
</div>
<!-- Card 2: Casual Leave -->
<div class="snap-center shrink-0 w-40 bg-white dark:bg-[#1c2a36] rounded-xl p-4 border border-gray-200 dark:border-gray-700 shadow-sm relative overflow-hidden group">
<div class="absolute top-0 right-0 w-16 h-16 bg-primary/10 rounded-bl-full -mr-4 -mt-4 transition-transform group-hover:scale-110"></div>
<div class="relative z-10">
<div class="w-10 h-10 rounded-lg bg-primary/20 flex items-center justify-center mb-3 text-primary">
<span class="material-icons text-xl">beach_access</span>
</div>
<p class="text-xs text-gray-500 dark:text-gray-400 font-medium mb-1">Casual Leave</p>
<div class="flex items-baseline space-x-1">
<span class="text-2xl font-bold text-gray-900 dark:text-white">10</span>
<span class="text-xs text-gray-400">/ 20 days</span>
</div>
<div class="w-full bg-gray-200 dark:bg-gray-700 h-1.5 rounded-full mt-3 overflow-hidden">
<div class="bg-primary h-full rounded-full" style="width: 50%"></div>
</div>
</div>
</div>
<!-- Card 3: Comp-Off -->
<div class="snap-center shrink-0 w-40 bg-white dark:bg-[#1c2a36] rounded-xl p-4 border border-gray-200 dark:border-gray-700 shadow-sm relative overflow-hidden group">
<div class="absolute top-0 right-0 w-16 h-16 bg-primary/10 rounded-bl-full -mr-4 -mt-4 transition-transform group-hover:scale-110"></div>
<div class="relative z-10">
<div class="w-10 h-10 rounded-lg bg-green-100 dark:bg-green-500/20 flex items-center justify-center mb-3 text-green-600 dark:text-green-400">
<span class="material-icons text-xl">access_time</span>
</div>
<p class="text-xs text-gray-500 dark:text-gray-400 font-medium mb-1">Comp-Off</p>
<div class="flex items-baseline space-x-1">
<span class="text-2xl font-bold text-gray-900 dark:text-white">1</span>
<span class="text-xs text-gray-400">/ 3 days</span>
</div>
<div class="w-full bg-gray-200 dark:bg-gray-700 h-1.5 rounded-full mt-3 overflow-hidden">
<div class="bg-green-500 h-full rounded-full" style="width: 33%"></div>
</div>
</div>
</div>
</div>
</section>
<!-- Application Form Section -->
<section class="px-6">
<h2 class="text-sm font-semibold uppercase tracking-wider text-gray-500 dark:text-gray-400 mb-6">New Application</h2>
<form class="space-y-6">
<!-- Leave Type Dropdown -->
<div class="space-y-2">
<label class="text-sm font-medium text-gray-700 dark:text-gray-300">Leave Type</label>
<div class="relative">
<select class="w-full bg-white dark:bg-[#1c2a36] border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-white rounded-lg pl-4 pr-10 py-3 appearance-none focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
<option>Casual Leave</option>
<option>Sick Leave</option>
<option>Comp-Off</option>
<option>Privilege Leave</option>
</select>
<div class="absolute inset-y-0 right-0 flex items-center px-3 pointer-events-none text-gray-500 dark:text-gray-400">
<span class="material-icons">expand_more</span>
</div>
</div>
</div>
<!-- Date Range -->
<div class="grid grid-cols-2 gap-4">
<div class="space-y-2">
<label class="text-sm font-medium text-gray-700 dark:text-gray-300">Start Date</label>
<div class="relative">
<input class="w-full bg-white dark:bg-[#1c2a36] border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-white rounded-lg pl-3 pr-2 py-3 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all text-sm [color-scheme:dark]" type="date"/>
</div>
</div>
<div class="space-y-2">
<label class="text-sm font-medium text-gray-700 dark:text-gray-300">End Date</label>
<div class="relative">
<input class="w-full bg-white dark:bg-[#1c2a36] border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-white rounded-lg pl-3 pr-2 py-3 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all text-sm [color-scheme:dark]" type="date"/>
</div>
</div>
</div>
<!-- Calculated Days Banner (UX Enhancement) -->
<div class="bg-primary/10 border border-primary/20 rounded-lg p-3 flex items-center justify-between">
<span class="text-sm text-primary dark:text-primary font-medium">Total Duration</span>
<span class="text-sm font-bold text-gray-900 dark:text-white">0 Days</span>
</div>
<!-- Reason Text Area -->
<div class="space-y-2">
<div class="flex justify-between">
<label class="text-sm font-medium text-gray-700 dark:text-gray-300">Reason</label>
<span class="text-xs text-gray-400">0/200</span>
</div>
<textarea class="w-full bg-white dark:bg-[#1c2a36] border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-white rounded-lg p-4 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all resize-none text-sm" placeholder="Briefly describe the reason for leave..." rows="4"></textarea>
</div>
<!-- File Upload -->
<div class="space-y-2">
<label class="text-sm font-medium text-gray-700 dark:text-gray-300">Attachments</label>
<div class="border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-lg p-6 flex flex-col items-center justify-center text-center hover:bg-gray-50 dark:hover:bg-[#253646] transition-colors cursor-pointer group">
<div class="w-10 h-10 rounded-full bg-gray-100 dark:bg-gray-700 flex items-center justify-center mb-3 group-hover:bg-primary/20 transition-colors">
<span class="material-icons text-gray-500 dark:text-gray-400 group-hover:text-primary">upload_file</span>
</div>
<p class="text-sm text-gray-600 dark:text-gray-300 font-medium">Upload Document</p>
<p class="text-xs text-gray-400 mt-1">Medical Certificate, etc. (Max 5MB)</p>
</div>
</div>
</form>
</section>
</main>
<!-- Sticky Footer Action -->
<div class="absolute bottom-0 left-0 w-full p-6 bg-white dark:bg-[#101922]/90 backdrop-blur-lg border-t border-gray-200 dark:border-gray-800 z-30">
<button class="w-full bg-primary hover:bg-blue-600 text-white font-semibold py-4 rounded-xl shadow-lg shadow-primary/30 active:transform active:scale-[0.98] transition-all flex items-center justify-center space-x-2">
<span>Submit Request</span>
<span class="material-icons text-sm">send</span>
</button>
</div>
</div>
</body></html>
