<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#137fec"/>
      <stop offset="100%" stop-color="#3b9eff"/>
    </linearGradient>
  </defs>
  <rect width="800" height="200" rx="16" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="700" cy="40" r="80" fill="#137fec" opacity="0.08"/>
  <circle cx="740" cy="160" r="60" fill="#137fec" opacity="0.06"/>
  <!-- Location pin icon -->
  <g transform="translate(60, 50)">
    <circle cx="50" cy="40" r="40" fill="#137fec" opacity="0.15"/>
    <path d="M50 15c-11 0-20 9-20 20 0 15 20 35 20 35s20-20 20-35c0-11-9-20-20-20zm0 28c-4.4 0-8-3.6-8-8s3.6-8 8-8 8 3.6 8 8-3.6 8-8 8z" fill="url(#accent)"/>
    <!-- Signal arcs -->
    <path d="M80 20c8 8 12 18 12 30" stroke="#3b9eff" stroke-width="2.5" fill="none" opacity="0.6" stroke-linecap="round"/>
    <path d="M88 12c10 10 16 24 16 38" stroke="#3b9eff" stroke-width="2" fill="none" opacity="0.35" stroke-linecap="round"/>
  </g>
  <!-- Text -->
  <text x="160" y="82" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="800" fill="white" letter-spacing="-0.5">Field Connect</text>
  <text x="160" y="115" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#94a3b8" letter-spacing="0.3">GPS Attendance • Live Tracking • Leave Management • Team Organogram</text>
  <!-- Decorative line -->
  <rect x="160" y="130" width="60" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>
</svg>
